name: Login to Majsoul

on:
  schedule:
    # 한국 시각 기준
    - cron: '12 21 * * 0'  # 월요일 06:12 KST
    - cron: '47 21 * * 1'  # 화요일 06:47 KST
    - cron: '3 22 * * 2'   # 수요일 07:03 KST
    - cron: '28 21 * * 3'  # 목요일 06:28 KST
    - cron: '16 22 * * 4'  # 금요일 07:16 KST
    - cron: '39 21 * * 5'  # 토요일 06:39 KST
    - cron: '54 21 * * 6'  # 일요일 06:54 KST
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute main.py
      run: python main.py
      env:
        UID: ${{ secrets.UID }}
        TOKEN: ${{ secrets.TOKEN }}

    - name: Update Keep-Alive File
      run: |
        echo "Last run: $(date)" > keep_alive.txt
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add keep_alive.txt
        git commit -m "Keep-alive: Update timestamp"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
